<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hồ sơ IFTV</title>
  <meta name="description" content="Hồ sơ năng lực IFTV - Giải pháp truyền thông và Bán hàng kỹ thuật số cho Bất Động Sản">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f2f2f2;
      color: #1a1a1a;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .page__back {
      align-self: flex-start;
      text-decoration: none;
      color: #666;
      font-size: 14px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }
    .page__back:hover { color: #1a1a1a; }
    .page__back svg { width: 18px; height: 18px; }
    .page__title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .page__desc {
      font-size: 14px;
      color: #666;
      margin-bottom: 24px;
    }
    .page__download {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: #1a1a1a;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      transition: background 0.2s, transform 0.15s;
      margin-bottom: 32px;
    }
    .page__download:hover { background: #333; transform: translateY(-1px); }
    .page__download svg { width: 20px; height: 20px; }
    .page__viewer {
      width: 100%;
      height: 80vh;
      border: 1px solid #ddd;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }
    .page__viewer iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    @media (max-width: 600px) {
      .page__viewer { height: 60vh; }
    }
  </style>
</head>
<body>
  <div class="page">
    <a href="../" class="page__back">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Quay lại
    </a>

    <h1 class="page__title">Hồ sơ IFTV</h1>
    <p class="page__desc">Xem trực tiếp hoặc tải về hồ sơ năng lực công ty</p>

    <a href="../assets/IFTV.pptx" download class="page__download">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
      Tải về IFTV.pptx
    </a>

    <div class="page__viewer">
      <iframe src="https://docs.google.com/gview?url=https://www.iftv.io.vn/bioiftvnow/assets/IFTV.pptx&embedded=true" allowfullscreen></iframe>
    </div>
  </div>
</body>
</html>
